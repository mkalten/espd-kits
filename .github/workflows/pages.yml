name: Deploy flasher (Pages)

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Copy manifests for static site
        run: |
          pip install -q pyyaml
          python3 scripts/generate-manifest.py --catalog
          python3 scripts/generate-manifest.py --version dev
          mkdir -p flasher/manifests
          cp manifests/boards.json flasher/manifests/boards.json
          cp manifests/releases.json flasher/manifests/releases.json

      - name: Mirror release firmware for flasher
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: python3 scripts/sync-flasher-releases.py

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: flasher

      - id: deployment
        uses: actions/deploy-pages@v4
