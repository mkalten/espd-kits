name: Build kit firmware

on:
  push:
    branches: [main, master]
    tags: ["v*"]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        board: [waveshare_s3]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Apply Pd patches
        run: ./espd/scripts/apply-pd-patches.sh

      - name: Resolve IDF target
        id: target
        run: |
          pip install -q pyyaml
          TARGET=$(python3 -c "import yaml; print(yaml.safe_load(open('boards/${{ matrix.board }}.yaml'))['target'])")
          echo "target=${TARGET}" >> "$GITHUB_OUTPUT"

      - name: Prepare sdkconfig.defaults.local
        run: |
          cp "boards/${{ matrix.board }}.yaml" "espd/boards/${{ matrix.board }}.yaml"
          cat "config/boards/${{ matrix.board }}.select" > "espd/sdkconfig.defaults.local"
          echo "sdkconfig.defaults.local:" && cat espd/sdkconfig.defaults.local
          test -s espd/sdkconfig.defaults.local

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v6.0.1
          target: ${{ steps.target.outputs.target }}
          command: idf.py set-target ${{ steps.target.outputs.target }} build
          path: espd

      - name: Collect artifacts
        run: |
          mkdir -p "dist/${{ matrix.board }}"
          cp espd/build/espd.bin \
             espd/build/bootloader/bootloader.bin \
             espd/build/partition_table/partition-table.bin \
             espd/build/flash_args \
             "dist/${{ matrix.board }}/"

      - uses: actions/upload-artifact@v4
        with:
          name: espd-kit-${{ matrix.board }}-${{ github.sha }}
          path: dist/${{ matrix.board }}/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          pattern: espd-kit-*-${{ github.sha }}
          merge-multiple: true
          path: dist

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          for board_dir in dist/*/; do
            board=$(basename "$board_dir")
            cp "${board_dir}bootloader.bin" "release-assets/${board}-bootloader.bin"
            cp "${board_dir}partition-table.bin" "release-assets/${board}-partition-table.bin"
            cp "${board_dir}espd.bin" "release-assets/${board}-espd.bin"
            cp "${board_dir}flash_args" "release-assets/${board}-flash_args"
          done
          ls -la release-assets

      - name: Generate manifest
        run: |
          pip install pyyaml
          python3 scripts/generate-manifest.py \
            --version "${GITHUB_REF_NAME}" \
            --base-url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}" \
            -o release-assets/manifest.json
          python3 scripts/generate-manifest.py \
            --version "${GITHUB_REF_NAME}" \
            --base-url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}"
          python3 scripts/generate-manifest.py --catalog

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            release-assets/**/*
