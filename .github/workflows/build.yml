name: Build kit firmware

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.boards.outputs.matrix }}
    steps:
      - uses: actions/checkout@v6

      - id: boards
        run: |
          pip install -q pyyaml
          echo "matrix=$(python3 scripts/generate-manifest.py --matrix-json)" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Apply Pd patches
        run: ./espd/scripts/apply-pd-patches.sh

      - name: Resolve IDF target
        id: target
        run: |
          pip install -q pyyaml
          TARGET=$(python3 -c "import yaml; print(yaml.safe_load(open('boards/${{ matrix.board }}.yaml'))['target'])")
          echo "target=${TARGET}" >> "$GITHUB_OUTPUT"

      - name: Prepare sdkconfig.defaults.local
        run: |
          python3 scripts/generate-manifest.py --select "${{ matrix.board }}" \
            > espd/sdkconfig.defaults.local
          echo "sdkconfig.defaults.local:" && cat espd/sdkconfig.defaults.local

      - name: Generate board plugins
        env:
          ESPD_BOARDS_DIR: ${{ github.workspace }}/boards
        run: ./scripts/prepare-board-build.sh

      - name: Build firmware
        uses: espressif/esp-idf-ci-action@v1
        env:
          ESPD_BOARDS_DIR: ${{ github.workspace }}/boards
        with:
          esp_idf_version: v6.0.1
          target: ${{ steps.target.outputs.target }}
          command: idf.py set-target ${{ steps.target.outputs.target }} build
          path: espd

      - name: Collect artifacts
        run: |
          mkdir -p "dist/${{ matrix.board }}"
          cp espd/build/espd.bin "dist/${{ matrix.board }}/${{ matrix.board }}-espd.bin"
          cp espd/build/bootloader/bootloader.bin "dist/${{ matrix.board }}/${{ matrix.board }}-bootloader.bin"
          cp espd/build/partition_table/partition-table.bin "dist/${{ matrix.board }}/${{ matrix.board }}-partition-table.bin"
          cp espd/build/flash_args "dist/${{ matrix.board }}/${{ matrix.board }}-flash_args"

      - uses: actions/upload-artifact@v7
        with:
          name: espd-kit-${{ matrix.board }}-${{ github.sha }}
          path: dist/${{ matrix.board }}/

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: write
    steps:
      - uses: actions/checkout@v6

      - uses: actions/download-artifact@v8
        with:
          path: dist

      - name: Prepare release assets
        run: |
          mkdir -p release-assets
          find dist -type f -exec cp {} release-assets/ \;
          if [ -z "$(ls -A release-assets)" ]; then
            echo "No release assets found under dist/"
            exit 1
          fi
          ls -la release-assets

      - name: Generate manifest
        run: |
          pip install pyyaml
          python3 scripts/generate-manifest.py \
            --version "${GITHUB_REF_NAME}" \
            --base-url "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}" \
            -o release-assets/manifest.json

      - uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release-assets/**/*

      - name: Redeploy flasher with new release assets
        uses: actions/github-script@v9
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'pages.yml',
              ref: 'main',
            })
