# ESPD board definition — source of truth for components/espd_board_waveshare_s3/
# Regenerated on every CMake configure (scripts/gen_board_plugins.py).

id: waveshare_s3
name: Waveshare ESP32-S3-AUDIO
target: esp32s3
help: |
  Waveshare AI Smart Speaker / ESP32-S3-AUDIO Board (ES8311 DAC,
  ES7210 mic). Fetches esp-bsp via Component Manager.

bsp:
  component: waveshare_esp32_s3_audio
  git: https://github.com/ben-wes/esp-bsp.git
  path: bsp/waveshare_esp32_s3_audio
  version: waveshare-s3-p4

features:
  imply:
    - ESPD_USE_ADC
    - ESPD_USE_SDCARD
    - ESPD_USE_AIN
    - ESPD_USE_AOUT
    - ESPD_USE_WIFI
    - ESPD_USE_USB_OTG

io:
  buttons: [VOLUP, PLAY, VOLDOWN]

profile:
  ESPD features:
    ESPD_USE_ADC: y
    ESPD_USE_SDCARD: y
    ESPD_USE_AIN: y
    ESPD_USE_AOUT: y
    ESPD_USE_WIFI: y
  Board hardware:
    ESPTOOLPY_FLASHSIZE_16MB: y
    SPIRAM: y
    SPIRAM_MODE_OCT: y
    SPIRAM_SPEED_80M: y
    SPIRAM_BOOT_INIT: y
    SPIRAM_USE_MALLOC: y
    SPIRAM_TRY_ALLOCATE_WIFI_LWIP: y
    SPIRAM_MALLOC_ALWAYSINTERNAL: 16384
    SPIRAM_MALLOC_RESERVE_INTERNAL: 65536
    # Run .text/.rodata from PSRAM — audio during MSC flash writes.
    SPIRAM_XIP_FROM_PSRAM: y
    ESP32S3_REV_MIN_2: y
    ESP32S3_REV_MIN_FULL: 2
    ESP_REV_MIN_FULL: 2
    CODEC_ES8311_SUPPORT: y
    CODEC_ES7210_SUPPORT: y
    BSP_SD_MOUNT_POINT: '"/sdcard"'
    IO_EXPANDER_ENABLE_GPIO_API_WRAPPER: y
  Pd runtime tuning:
    ESP_DEFAULT_CPU_FREQ_MHZ_240: y
    ESP_WIFI_STATIC_RX_BUFFER_NUM: 8
    ESP_WIFI_DYNAMIC_RX_BUFFER_NUM: 16
    ESP_WIFI_DYNAMIC_TX_BUFFER_NUM: 16
    LWIP_MAX_SOCKETS: 8
    LWIP_IPV6: y
    MBEDTLS_TLS_CLIENT_ONLY: y
    COMPILER_OPTIMIZATION_PERF: y
    COMPILER_OPTIMIZATION_ASSERTIONS_DISABLE: y
    COMPILER_OPTIMIZATION_ASSERTION_LEVEL: 0
    LOG_DEFAULT_LEVEL_INFO: y
    LOG_DEFAULT_LEVEL: 3
    LOG_MAXIMUM_LEVEL_INFO: y
    LOG_MAXIMUM_LEVEL: 3
    FREERTOS_IN_IRAM: y
  USB OTG:
    ESPD_USE_USB_OTG: y
    ESPD_USE_USB_MSC: y
    TINYUSB_MSC_ENABLED: y
    TINYUSB_CDC_ENABLED: y
    ESPD_DEV_CDC_SYNC: y
    ESP_CONSOLE_NONE: y
